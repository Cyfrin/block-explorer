name: battlechain-indexer
description: Indexes BattleChain contract states and Safe Harbor agreements
repository: https://github.com/pickleyd/block-explorer
project_type: no-code

networks:
  - name: battlechain
    chain_id: 270
    rpc: ${BLOCKCHAIN_RPC_URL}

storage:
  postgres:
    enabled: true

contracts:
  # Core State Tracking - AttackRegistry
  - name: AttackRegistry
    details:
      - network: battlechain
        address: "0x0000000000000000000000000000000000000000"
        start_block: "0"
    abi: ./abis/AttackRegistry.abi.json
    include_events:
      - ContractStateChanged

  # Agreement Factory - tracks new agreement deployments
  - name: AgreementFactory
    details:
      - network: battlechain
        address: "0x0000000000000000000000000000000000000000"
        start_block: "0"
    abi: ./abis/AgreementFactory.abi.json
    include_events:
      - AgreementCreated
